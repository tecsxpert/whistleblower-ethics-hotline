version: "3.9"

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: whistleblower_postgres
    environment:
      POSTGRES_DB: whistleblower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whistleblower"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - whistleblower-network
    restart: unless-stopped

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: whistleblower_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - whistleblower-network
    restart: unless-stopped

  # 3. Java Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whistleblower_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/whistleblower
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: spoorthir.200@gmail.com
      SPRING_MAIL_PASSWORD: wlwq rdus wixp tjng
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/auth/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - whistleblower-network
    restart: unless-stopped


volumes:
  postgres_data:
  redis_data:

networks:
  whistleblower-network:
    driver: bridge
